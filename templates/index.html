<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理 - TaskMgmt</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="header-title">任务管理</h1>
            <p class="header-subtitle">Task Management</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <span class="total-tasks" id="totalTasks">0 个任务</span>
            </div>
            <div class="toolbar-right">
                <input type="text" class="search-input" id="filterAssignee" placeholder="搜索负责人...">
                <button class="btn-add" id="addTaskBtn">
                    <span class="btn-icon">+</span>
                    新建任务
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-number" id="stat-todo">0</span>
                <span class="stat-label">待办</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="stat-inprogress">0</span>
                <span class="stat-label">进行中</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="stat-done">0</span>
                <span class="stat-label">已完成</span>
            </div>
        </div>

        <!-- Kanban Board -->
        <div class="kanban-board">
            <div class="kanban-column">
                <div class="kanban-header">
                    <h3>待办事项</h3>
                    <span class="column-count" id="count-todo">0</span>
                </div>
                <div class="kanban-tasks" id="tasks-todo"></div>
            </div>

            <div class="kanban-column">
                <div class="kanban-header in-progress">
                    <h3>进行中</h3>
                    <span class="column-count" id="count-inprogress">0</span>
                </div>
                <div class="kanban-tasks" id="tasks-inprogress"></div>
            </div>

            <div class="kanban-column">
                <div class="kanban-header done">
                    <h3>已完成</h3>
                    <span class="column-count" id="count-done">0</span>
                </div>
                <div class="kanban-tasks" id="tasks-done"></div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">新建任务</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <div class="form-group">
                        <label class="form-label">任务标题</label>
                        <input type="text" class="form-input" id="taskTitle" placeholder="输入任务标题" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">任务描述</label>
                        <textarea class="form-textarea" id="taskDescription" placeholder="输入任务描述"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">状态</label>
                            <select class="form-select" id="taskStatus">
                                <option value="To Do">待办</option>
                                <option value="In Progress">进行中</option>
                                <option value="Done">已完成</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">负责人</label>
                            <input type="text" class="form-input" id="taskAssignedTo" placeholder="输入负责人">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">开始时间</label>
                            <input type="datetime-local" class="form-input" id="taskStartDate">
                        </div>
                        <div class="form-group">
                            <label class="form-label">完成时间</label>
                            <input type="datetime-local" class="form-input" id="taskCompletedDate">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelBtn">取消</button>
                <button class="btn-save" id="saveTaskBtn">保存</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
