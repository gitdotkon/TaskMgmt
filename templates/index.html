<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📋 Task Management Tool</span>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Header with Add Task Button -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Task Board</h2>
            <div>
                <input type="text" class="form-control d-inline-block me-2" id="filterAssignee" 
                       placeholder="Filter by assignee..." style="width: 200px;">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#taskModal">
                    ➕ Add Task
                </button>
            </div>
        </div>

        <!-- Kanban Board -->
        <div class="kanban-board">
            <div class="kanban-column">
                <div class="kanban-header status-todo">
                    <h5>📋 To Do</h5>
                    <span class="task-count" id="count-todo">0</span>
                </div>
                <div class="kanban-tasks" id="tasks-todo">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>

            <div class="kanban-column">
                <div class="kanban-header status-inprogress">
                    <h5>🚀 In Progress</h5>
                    <span class="task-count" id="count-inprogress">0</span>
                </div>
                <div class="kanban-tasks" id="tasks-inprogress">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>

            <div class="kanban-column">
                <div class="kanban-header status-done">
                    <h5>✅ Done</h5>
                    <span class="task-count" id="count-done">0</span>
                </div>
                <div class="kanban-tasks" id="tasks-done">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>

            <div class="kanban-column">
                <div class="kanban-header status-blocked">
                    <h5>🚫 Blocked</h5>
                    <span class="task-count" id="count-blocked">0</span>
                </div>
                <div class="kanban-tasks" id="tasks-blocked">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <div class="mb-3">
                            <label for="taskTitle" class="form-label">Title *</label>
                            <input type="text" class="form-control" id="taskTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="taskDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="taskDescription" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="taskStatus" class="form-label">Status</label>
                            <select class="form-select" id="taskStatus">
                                <option value="To Do">To Do</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Done">Done</option>
                                <option value="Blocked">Blocked</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="taskAssignedTo" class="form-label">Assigned To</label>
                            <input type="text" class="form-control" id="taskAssignedTo">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveTaskBtn">Save Task</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
